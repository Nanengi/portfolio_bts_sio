<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: 'Poppons',sans-serif;
}

body{
    background: #9bedf8;
}

.container{
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
}

.box{
    background: white;
    display: flex;
    flex-direction: column;
    padding: 25px 25px;
    border-radius: 20px;
    box-shadow: 0 0 128px 0 rgba(0,0,0,0.1),
                0 32px 64px -48px rgba(0,0,0,0.5);

}

.form-box{
    width: 450px;
    margin: 0px 10px;

}
.form-box h1{
    font-size: 25px;
    font-weight: 600;
    padding-bottom: 10px;
    border-bottom:1px solid #502511;
    margin-bottom: 10px;
}

.form-box form .field{
    display: flex;
    margin-bottom: 10px;
    flex-direction: column;
}

.form-box form .input input{

    height: 40px;
    width: 100%;
    font-size: 16px;
    padding: 0 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    outline: none;

}

.btn{
    height: 35px;
    background: #3498db;
    border: 0;
    border-radius: 2px;
    color: white;
    font-size: 15px;
    cursor:pointer;
    transition: all .3s;
    margin-top: 5px;
    padding: 0px 10px;
}

.btn:hover{
    opacity: 0.82;
}

.submit{
    width: 100%;

}


.lien{
    margin-bottom: 15px;
}
        </style>
</head>
<body>
    <div class="container">
        <div class="box form-box">
            <h1>creez votre compte</h1>
            <form>
                <div class="field input">
                    <label for="nom"> nom :</label>
                    <input type="text" id="nom" name="nom" value="" required />
                    </div>
    
                    <div class="field input">
                    <label for="prenom"> prenom :</label>
                    <input type="text" id="prenom" name="prenom" value="" required />
                    </div>
    
                    <div class="field input">
                    <label for="adresse"> adresse :</label>
                    <input type="text" id="adresse" name="adresse" value="" required />
                    </div>
    
                    <div class="field input">
                    <label for="username"> nom d'utilisateur :</label>
                    <input type="text" id="username" name="username" value="" required />
                    </div>
    
                    <div class="field input">
                    <label for="password"> mot de passe :</label>
                    <input type="password" id="password" name="password" value="" required />
                    </div>
    
                    <div class="field input ">
                    <label for="cpassword"> confirmez mot passe :</label>
                    <input type="password" id="cpassword" name="cpassword" value="" required />
                    </div>  
    
                    <div class="field">
                    
                    <center><a href="./Page A (1).html" class="btn">soumettre</a></center>

                    </div>
    
                    <div class="lien">
                        Déja un compte ? <a href="./formulaire_con (1) 1.html"> Connexion </a>
                    </div>
            </form>

                
            
        </div>
    </div>
</body>
</html>
